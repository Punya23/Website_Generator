<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Micro+5&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-brand">
        <span class="topbar-mark" aria-hidden="true"></span>
        <span>Website Generator</span>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <h1 class="hero-title">Build your site</h1>
        <p class="hero-sub">Describe your business in a line or two. A full website appears.</p>

        <div class="hero-card">
          <label class="sr-only" for="brief">Your business</label>
          <textarea
            id="brief"
            rows="3"
            placeholder="e.g. Kalpvruksh Finserv — financial aggregator for mutual funds, loans, and insurance"
          ></textarea>
          <button type="button" class="generate" id="generate">
            <span class="btn-label">Generate website</span>
            <span class="btn-spinner" hidden></span>
          </button>
        </div>

        <div class="hero-examples" id="examples" aria-label="Example prompts"></div>
        <div class="hero-seed">
          <label for="variation-seed">Variation seed <span class="seed-hint">(optional — reuse for A/B)</span></label>
          <input type="number" id="variation-seed" placeholder="Auto" inputmode="numeric" />
        </div>
      </section>

      <section class="pipeline" aria-label="Generation pipeline">
        <div class="pipeline-head">
          <span class="pipeline-label">Pipeline</span>
          <button type="button" class="ghost" id="clear-log">Clear</button>
        </div>
        <pre class="terminal" id="terminal" aria-live="polite"><span class="terminal-idle">Waiting for your brief…</span></pre>
      </section>

      <section class="preview" id="preview-panel" hidden>
        <div class="preview-head">
          <span id="preview-title">Preview</span>
          <div class="preview-actions">
            <a class="ghost" id="export-json" href="/api/export?format=project" download="site-context.json">Export JSON</a>
            <a class="ghost" id="export-react" href="/api/export?format=react" download="site.tsx">Export React</a>
            <a class="ghost" id="open-tab" href="#" target="_blank" rel="noopener">Open ↗</a>
          </div>
        </div>
        <iframe id="preview" title="Generated website preview" sandbox="allow-same-origin allow-scripts"></iframe>
      </section>

      <section class="editor" id="editor-panel" hidden>
        <div class="editor-head">
          <span class="pipeline-label">Site editor</span>
        </div>
        <div class="editor-grid">
          <div class="editor-theme">
            <h3>Theme</h3>
            <label>Accent <input type="color" id="theme-accent" /></label>
            <label>Background <input type="color" id="theme-bg" /></label>
            <label>Heading font <input type="text" id="theme-heading-font" /></label>
            <label>Motion <select id="theme-motion">
              <option value="fade-up">Fade up</option>
              <option value="stagger">Stagger</option>
              <option value="scale-in">Scale in</option>
              <option value="slide-left">Slide left</option>
              <option value="parallax-hero">Parallax hero</option>
              <option value="none">None</option>
            </select></label>
            <button type="button" class="ghost" id="apply-theme">Apply theme</button>
          </div>
          <div class="editor-sections">
            <h3>Sections <span id="editor-page-label"></span></h3>
            <ul id="section-list" class="section-list"></ul>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="/app.js" type="module"></script>
</body>
</html>
